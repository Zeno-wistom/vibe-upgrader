<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc"><title id="title">Vibe-Upgrader 四步工作流程</title><desc id="desc">理解页面，选择 Standard 或 Experimental 轨道，完成受控实现或隔离原型，最后验证交付。</desc><defs><pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="#11110f" stroke-opacity=".055"/></pattern><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="8" dy="10" stdDeviation="0" flood-color="#11110f" flood-opacity=".16"/></filter><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#ff5a4f"/></marker></defs><rect width="1200" height="820" rx="34" fill="#f3f1e9"/><rect width="1200" height="820" rx="34" fill="url(#grid)"/><g font-family="Inter,Arial,'Microsoft YaHei',sans-serif" fill="#11110f"><text x="60" y="58" font-family="Consolas,monospace" font-size="18" letter-spacing="2">VIBE-UPGRADER / WORKFLOW</text><text x="60" y="118" font-size="48" font-weight="800">四步完成一次可验证升级</text><path d="M390 245H432" stroke="#ff5a4f" stroke-width="5" marker-end="url(#arrow)"/><path d="M600 340V382M600 382H310V416M600 382H890V416" fill="none" stroke="#ff5a4f" stroke-width="5"/><path d="M310 610V650H600M890 610V650H600V684" fill="none" stroke="#ff5a4f" stroke-width="5" marker-end="url(#arrow)"/><g filter="url(#shadow)"><rect x="60" y="165" width="330" height="175" rx="24" fill="#fffdf7" stroke="#11110f" stroke-width="2"/><circle cx="100" cy="210" r="22" fill="#c7ff42" stroke="#11110f" stroke-width="2"/><text x="100" y="217" text-anchor="middle" font-size="18" font-weight="800">01</text><text x="92" y="274" font-size="40" font-weight="800">理解页面</text><text x="92" y="312" font-size="22" fill="#5e5d58">目标 · 范围 · 保留内容</text></g><g filter="url(#shadow)"><rect x="435" y="165" width="330" height="175" rx="24" fill="#fffdf7" stroke="#11110f" stroke-width="2"/><circle cx="475" cy="210" r="22" fill="#ff5a4f" stroke="#11110f" stroke-width="2"/><text x="475" y="217" text-anchor="middle" font-size="18" font-weight="800">02</text><text x="467" y="274" font-size="40" font-weight="800">选择轨道</text><text x="467" y="312" font-size="22" fill="#5e5d58">根据风险与视觉目标</text></g><g filter="url(#shadow)"><rect x="60" y="416" width="500" height="194" rx="26" fill="#11110f"/><rect x="88" y="444" width="126" height="34" rx="17" fill="#c7ff42"/><text x="151" y="467" text-anchor="middle" font-family="Consolas,monospace" font-size="17" font-weight="700">STANDARD</text><text x="88" y="536" font-size="42" font-weight="800" fill="#fffdf7">03A 受控实现</text><text x="88" y="578" font-size="22" fill="#d4d1c7">在真实产品中修改并验证</text></g><g filter="url(#shadow)"><rect x="640" y="416" width="500" height="194" rx="26" fill="#c7ff42" stroke="#11110f" stroke-width="2"/><rect x="668" y="444" width="166" height="34" rx="17" fill="#11110f"/><text x="751" y="467" text-anchor="middle" font-family="Consolas,monospace" font-size="17" font-weight="700" fill="#fffdf7">EXPERIMENTAL</text><text x="668" y="536" font-size="42" font-weight="800">03B 隔离原型</text><text x="668" y="578" font-size="22" fill="#33332f">人工门禁后再决定是否整合</text></g><g filter="url(#shadow)"><rect x="330" y="684" width="540" height="104" rx="24" fill="#fffdf7" stroke="#11110f" stroke-width="2"/><circle cx="380" cy="736" r="25" fill="#11110f"/><text x="380" y="744" text-anchor="middle" font-size="18" font-weight="800" fill="#fffdf7">04</text><text x="425" y="728" font-size="35" font-weight="800">验证交付</text><text x="425" y="760" font-size="19" fill="#5e5d58">构建 · 交互 · 响应式 · 人工判断</text></g></g></svg>